name: NOVA Otomatik Trade

on:
  schedule:
    - cron: '5 7 * * 1-5'
    - cron: '5 9 * * 1-5'
    - cron: '5 11 * * 1-5'
    - cron: '5 13 * * 1-5'
    - cron: '0 15 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Bagimliliklar
        run: pip install -r requirements.txt
      - name: NOVA otomatik tur
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AVCI_VADE: gunluk
        run: python robot_calistir.py
      - name: Durumu kaydet
        run: |
          git config user.name "NOVA Robot"
          git config user.email "nova@apex.local"
          git add robot_durum.json
          git commit -m "NOVA tur" || echo "yok"
          git push || echo "yok"
