name: APEX Backtest
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bağımlılıklar
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install numpy pandas scikit-learn requests
      - name: Backtest çalıştır
        run: python backtest_runner.py
      - name: Sonucu commit et
        run: |
          git config user.name "APEX Backtest"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "backtest: mevduat kiyasi" || echo "degisiklik yok"
          git pull --rebase origin main
          git push
