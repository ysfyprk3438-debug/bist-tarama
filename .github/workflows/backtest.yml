name: APEX Backtest
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1-5"   # her iş günü 07:00 UTC (10:00 TR) otomatik çalışır
permissions:
  contents: write
jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bağımlılıklar
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install numpy pandas scikit-learn requests
      - name: APEX çalıştır
        run: python backtest_runner.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Sonucu commit et
        run: |
          git config user.name "APEX Backtest"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "apex: ileri gunluk guncelleme" || echo "degisiklik yok"
          git pull --rebase origin main
          git push
